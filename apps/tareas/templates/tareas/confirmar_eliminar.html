{% extends 'base.html' %}
{% block title %}Eliminar Tarea — GestorPro{% endblock %}
{% block content %}
<div class="page-header">
  <div>
    <a href="{% url 'detalle_proyecto' tarea.proyecto.pk %}" class="breadcrumb-back"><i class="bi bi-arrow-left"></i> Volver</a>
    <h1 class="page-title">Eliminar Tarea</h1>
  </div>
</div>
<div class="confirm-delete-card">
  <div class="confirm-icon"><i class="bi bi-exclamation-triangle-fill"></i></div>
  <h3>¿Eliminar "{{ tarea.titulo }}"?</h3>
  <p>Esta acción no se puede deshacer.</p>
  <form method="post" class="d-flex gap-2 justify-content-center mt-3">
    {% csrf_token %}
    <a href="{% url 'detalle_proyecto' tarea.proyecto.pk %}" class="btn btn-outline-secondary">Cancelar</a>
    <button type="submit" class="btn btn-danger"><i class="bi bi-trash"></i> Sí, eliminar</button>
  </form>
</div>
{% endblock %}
